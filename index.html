<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRUD de Usuários</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>CRUD de Usuários</h1>

    <form id="form-usuario">
      <input type="hidden" id="indice-edicao">

      <div class="campo">
        <label for="nome">Nome</label>
        <input type="text" id="nome" placeholder="Digite o nome">
      </div>

      <div class="campo">
        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="Digite o e-mail">
      </div>

      <div class="botoes-form">
        <button type="submit" id="btn-salvar">Salvar</button>
        <button type="button" id="btn-cancelar" style="display: none;">Cancelar edição</button>
      </div>
    </form>

    <p id="mensagem"></p>
    <p id="contador"></p>

    <div class="campo">
      <label for="busca">Buscar usuário</label>
      <input type="text" id="busca" placeholder="Digite um nome para buscar">
    </div>

    <table>
      <thead>
        <tr>
          <th>Nome</th>
          <th>E-mail</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="tabela-usuarios"></tbody>
    </table>
  </div>

  <script src="index.js"></script>
</body>
</html>
